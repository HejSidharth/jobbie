name: Jobs Sync

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: jobs-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync jobs
        run: npm run jobs:sync

      - name: Commit updated job data
        run: |
          if git diff --quiet -- public/data; then
            echo "No job data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore(jobs): hourly sync"
          git push
